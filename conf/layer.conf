# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-zigbee"
BBFILE_PATTERN_meta-zigbee = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-zigbee = "6"

LAYERDEPENDS_meta-zigbee = "core openembedded-layer"
LAYERSERIES_COMPAT_meta-zigbee = "kirkstone langdale scarthgap"
